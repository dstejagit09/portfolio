<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Card Stacks v2 // Saiteja Dasari</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --bg-base: #1a0708;
  --bg-elevated: #2e0e0e;
  --text-primary: #f7ece8;
  --text-secondary: #c2a59f;
  --text-muted: #8a6a65;
  --border: rgba(253, 250, 216, 0.09);
  --border-strong: rgba(253, 250, 216, 0.18);
  --accent: #fdfad8;
  --accent-soft: rgba(253, 250, 216, 0.14);
  --accent-hover: #ffffff;
  --font-display: 'Instrument Serif', Georgia, serif;
  --font-heading: 'Space Grotesk', -apple-system, sans-serif;
  --font-body: 'Inter', -apple-system, sans-serif;
  --font-mono: 'JetBrains Mono', Menlo, monospace;
  --ease-out: cubic-bezier(0.2, 0.8, 0.2, 1);
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
}

html, body {
  background: var(--bg-base);
  color: var(--text-primary);
  font-family: var(--font-body);
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  overflow-x: hidden;
}

.ambient-bg {
  position: fixed;
  inset: 0;
  z-index: 0;
  background:
    radial-gradient(ellipse 800px 600px at 15% 20%, rgba(253, 250, 216, 0.05) 0%, transparent 60%),
    radial-gradient(ellipse 800px 600px at 85% 80%, rgba(253, 250, 216, 0.025) 0%, transparent 60%),
    var(--bg-base);
}

.page {
  position: relative;
  z-index: 1;
  max-width: 1280px;
  margin: 0 auto;
  padding: 40px 40px 80px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* HEADER */
.top-header {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  margin-bottom: 40px;
  padding-bottom: 24px;
  border-bottom: 0.5px solid var(--border);
}

.warehouse-btn {
  position: fixed;
  top: 24px;
  left: 24px;
  z-index: 50;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 10px 16px;
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  text-decoration: none;
  color: var(--accent);
  background: rgba(253, 250, 216, 0.08);
  border: 0.5px solid rgba(253, 250, 216, 0.35);
  border-radius: 10px;
  -webkit-backdrop-filter: blur(20px) saturate(1.3);
  backdrop-filter: blur(20px) saturate(1.3);
  transition: all 0.2s var(--ease-out);
}

.warehouse-btn:hover {
  background: rgba(253, 250, 216, 0.16);
  border-color: rgba(253, 250, 216, 0.6);
  color: var(--accent-hover);
}

.warehouse-btn .wh-arrow { font-size: 14px; line-height: 1; }

@media (max-width: 900px) {
  .warehouse-btn { top: 14px; left: 14px; padding: 8px 12px; font-size: 10px; }
}

.brand {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}

.brand-mark {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent) 0%, #8B7D5A 100%);
  color: #0B0B0F;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-heading);
  font-weight: 700;
  font-size: 13px;
  letter-spacing: -0.02em;
}

.brand-text {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  line-height: 1.2;
}

.brand-name {
  font-family: var(--font-heading);
  font-size: 42px;
  font-weight: 600;
  letter-spacing: -0.01em;
  color: var(--text-primary);
}

.brand-sub {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-secondary);
  letter-spacing: 0.1em;
  margin-top: 1px;
}

.header-meta {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-muted);
  letter-spacing: 0.15em;
  display: flex;
  align-items: center;
  gap: 8px;
}

.status-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--accent);
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

/* NAV */
.section-nav {
  display: flex;
  gap: 4px;
  padding: 5px;
  background: rgba(253, 250, 216, 0.06);
  -webkit-backdrop-filter: blur(22px) saturate(1.4);
  backdrop-filter: blur(22px) saturate(1.4);
  border: 0.5px solid rgba(253, 250, 216, 0.14);
  border-radius: 14px;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.28), inset 0 1px 0 rgba(255, 255, 255, 0.06);
  margin-bottom: 40px;
  width: fit-content;
  max-width: 100%;
  align-self: center;
}

.nav-btn {
  flex: 1 1 0;
  padding: 10px 16px;
  background: transparent;
  border: none;
  color: var(--text-secondary);
  font-family: var(--font-heading);
  font-size: 15px;
  font-weight: 500;
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.2s var(--ease-out);
  display: flex;
  align-items: center;
  justify-content: flex-start;
  white-space: nowrap;
  gap: 8px;
}

.nav-btn::before {
  content: attr(data-num);
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-muted);
  font-weight: 500;
}

.nav-btn:hover {
  color: var(--text-primary);
  background: rgba(255, 255, 255, 0.04);
}

.nav-btn.active {
  color: #23090a;
  background: var(--accent);
}

.nav-btn.active::before {
  color: rgba(35, 9, 10, 0.6);
}

/* STACK LAYOUT */
.section-view {
  display: none;
  flex: 1;
}

.section-view.active {
  display: block;
  animation: sectionIn 0.5s var(--ease-out);
}

@keyframes sectionIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.stack-layout {
  display: grid;
  grid-template-columns: 380px 560px;
  justify-content: center;
  gap: 64px;
  align-items: start;
  min-height: 620px;
}

.stack-layout.role-solo {
  grid-template-columns: minmax(0, 560px);
}

/* COVER */
.cover {
  position: sticky;
  top: 40px;
  padding: 32px 0;
  display: flex;
  flex-direction: column;
  min-height: 620px;
  justify-content: space-between;
}

.cover-num {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--accent);
  letter-spacing: 0.2em;
  font-weight: 500;
  margin-bottom: 20px;
}

.cover-title {
  font-family: var(--font-display);
  font-size: 92px;
  line-height: 0.95;
  color: var(--text-primary);
  font-weight: 400;
  letter-spacing: -0.03em;
  margin-bottom: 16px;
}

.cover-title em {
  font-style: italic;
  color: var(--accent);
}

.cover-description {
  font-family: var(--font-body);
  font-size: 16px;
  line-height: 1.65;
  color: var(--text-secondary);
  max-width: 340px;
  margin-bottom: 40px;
}

.cover-counter {
  display: flex;
  align-items: baseline;
  gap: 10px;
  padding-top: 24px;
  border-top: 0.5px solid var(--border);
}

.counter-current {
  font-family: var(--font-heading);
  font-size: 48px;
  font-weight: 500;
  color: var(--text-primary);
  letter-spacing: -0.02em;
  line-height: 1;
}

.counter-total {
  font-family: var(--font-mono);
  font-size: 15px;
  color: var(--text-muted);
  letter-spacing: 0.1em;
}

.cover-progress {
  height: 2px;
  background: var(--border);
  border-radius: 2px;
  margin-top: 20px;
  overflow: hidden;
}

.cover-progress-fill {
  height: 100%;
  background: var(--accent);
  transition: width 0.4s var(--ease-out);
}

/* DECK */
.deck-container {
  display: flex;
  flex-direction: column;
}

.deck {
  position: relative;
  width: 100%;
  max-width: 560px;
  aspect-ratio: 3 / 4.4;
  perspective: 1400px;
}

.card {
  position: absolute;
  inset: 0;
  border-radius: 20px;
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.6s var(--ease-spring), opacity 0.6s var(--ease-out);
  transform-style: preserve-3d;
  will-change: transform;
  background: var(--bg-elevated);
  border: 0.5px solid var(--border-strong);
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
}

.card[data-position="1"] {
  transform: translateY(20px) translateX(30px) scale(0.94) rotateZ(3deg);
  z-index: 3;
  opacity: 0.65;
}

.card[data-position="2"] {
  transform: translateY(40px) translateX(60px) scale(0.88) rotateZ(6deg);
  z-index: 2;
  opacity: 0.35;
}

.card[data-position="3"] {
  transform: translateY(60px) translateX(90px) scale(0.82) rotateZ(9deg);
  z-index: 1;
  opacity: 0.15;
}

.card[data-position="hidden"] {
  transform: translateY(80px) translateX(120px) scale(0.75);
  z-index: 0;
  opacity: 0;
  pointer-events: none;
}

.card[data-position="0"] {
  transform: translateY(0) translateX(0) scale(1) rotateZ(0);
  z-index: 4;
  opacity: 1;
}

/* CARD VISUAL (top 50%) */
.card-visual {
  position: relative;
  height: 50%;
  overflow: hidden;
  background: #000;
  padding: 18px 22px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

.blob {
  position: absolute;
  border-radius: 50%;
  filter: blur(55px);
  opacity: 0.85;
  will-change: transform;
  z-index: 0;
}

.blob-1 { top: -15%; left: -10%; width: 75%; height: 75%; animation: floatA 12s ease-in-out infinite; }
.blob-2 { top: 25%; left: 40%; width: 65%; height: 65%; animation: floatB 15s ease-in-out infinite; }
.blob-3 { top: 45%; left: -5%; width: 60%; height: 60%; animation: floatC 18s ease-in-out infinite; }

@keyframes floatA {
  0%, 100% { transform: translate(0, 0) scale(1); }
  50% { transform: translate(20px, 15px) scale(1.1); }
}

@keyframes floatB {
  0%, 100% { transform: translate(0, 0) scale(1); }
  50% { transform: translate(-25px, 20px) scale(0.9); }
}

@keyframes floatC {
  0%, 100% { transform: translate(0, 0) scale(1); }
  50% { transform: translate(15px, -20px) scale(1.15); }
}

.visual-grain {
  position: absolute;
  inset: 0;
  background-image: radial-gradient(circle at 1px 1px, rgba(255, 255, 255, 0.15) 1px, transparent 0);
  background-size: 3px 3px;
  opacity: 0.4;
  mix-blend-mode: overlay;
  z-index: 1;
}

.visual-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, rgba(0,0,0,0.35) 0%, transparent 30%, transparent 60%, rgba(20, 20, 26, 0.6) 100%);
  z-index: 1;
}

/* Role model card: portrait photo fills the top visual half */
.visual-photo { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
.role-visual .visual-overlay { background: linear-gradient(180deg, rgba(0,0,0,0.45) 0%, transparent 30%, transparent 44%, rgba(15, 6, 6, 0.88) 100%); z-index: 2; }
.role-visual .visual-top, .role-visual .visual-title { z-index: 3; }
.photo-empty { position: absolute; inset: 0; z-index: 1; display: flex; align-items: center; justify-content: center; font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.28em; color: rgba(255, 255, 255, 0.4); }
.card.role-card .card-visual { height: 66%; }   /* larger portrait so each image fills the card uniformly */
.role-body { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
.role-note { color: var(--text-secondary); line-height: 1.6; }
.role-note:empty::before { content: 'A line about them and their character goes here.'; color: var(--text-muted); opacity: 0.5; }
.role-words { display: flex; flex-direction: column; align-items: center; gap: 8px; }
.role-word { font-family: var(--font-heading); font-weight: 600; font-size: clamp(16px, 4.4vw, 21px); letter-spacing: 0.06em; text-transform: uppercase; color: var(--accent); line-height: 1.1; }

.visual-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: relative;
  z-index: 2;
}

.visual-badge {
  padding: 5px 10px;
  background: rgba(0, 0, 0, 0.55);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border: 0.5px solid rgba(255, 255, 255, 0.15);
  border-radius: 20px;
  font-family: var(--font-mono);
  font-size: 10px;
  color: white;
  letter-spacing: 0.15em;
  font-weight: 500;
}

.visual-icon {
  width: 30px;
  height: 30px;
  background: rgba(0, 0, 0, 0.4);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border: 0.5px solid rgba(255, 255, 255, 0.15);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-family: var(--font-mono);
  font-size: 13px;
  font-weight: 500;
}

/* Project name on visual */
.visual-title {
  position: relative;
  z-index: 2;
  margin-top: 8px;
}

.project-name {
  font-family: var(--font-heading);
  font-size: 22px;
  color: white;
  font-weight: 500;
  line-height: 1.2;
  letter-spacing: -0.01em;
  text-shadow: 0 2px 12px rgba(0, 0, 0, 0.5);
}

.project-sub {
  font-family: var(--font-mono);
  font-size: 11px;
  color: rgba(255, 255, 255, 0.75);
  letter-spacing: 0.1em;
  margin-top: 4px;
  text-shadow: 0 1px 4px rgba(0, 0, 0, 0.5);
}

/* Video thumbnail */
.visual-thumb {
  position: relative;
  z-index: 2;
  margin: 0 auto;
  width: 100%;
  max-width: 200px;
  aspect-ratio: 16 / 9;
  background: rgba(0, 0, 0, 0.55);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border: 0.5px solid rgba(255, 255, 255, 0.2);
  border-radius: 8px;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: transform 0.2s var(--ease-out), border-color 0.2s;
}

.visual-thumb:hover {
  transform: scale(1.03);
  border-color: rgba(255, 255, 255, 0.35);
}

.thumb-play {
  width: 34px;
  height: 34px;
  background: rgba(255, 255, 255, 0.15);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border: 0.5px solid rgba(255, 255, 255, 0.3);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 11px;
  padding-left: 3px;
}

.thumb-label {
  position: absolute;
  bottom: 5px;
  left: 7px;
  right: 7px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-family: var(--font-mono);
  font-size: 8px;
  color: rgba(255, 255, 255, 0.85);
  letter-spacing: 0.08em;
  text-shadow: 0 1px 3px rgba(0, 0, 0, 0.6);
}

/* Metric block (bottom of visual) */
.visual-metric {
  position: relative;
  z-index: 2;
}

.metric-value {
  font-family: var(--font-heading);
  font-size: 31px;
  font-weight: 500;
  color: white;
  letter-spacing: -0.02em;
  line-height: 1;
  text-shadow: 0 2px 20px rgba(0, 0, 0, 0.5);
}

.metric-label {
  font-family: var(--font-mono);
  font-size: 11px;
  color: rgba(255, 255, 255, 0.8);
  letter-spacing: 0.15em;
  font-weight: 500;
  margin-top: 5px;
  text-shadow: 0 1px 4px rgba(0, 0, 0, 0.5);
}

/* CARD BODY (bottom 50%) */
.card-body {
  padding: 20px 22px 20px;
  background: var(--bg-elevated);
  height: 50%;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.card-date {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--accent);
  letter-spacing: 0.15em;
  font-weight: 500;
}

.card-description {
  font-family: var(--font-body);
  font-size: 13.5px;
  line-height: 1.55;
  color: var(--text-secondary);
  display: -webkit-box;
  -webkit-line-clamp: 5;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.card-tags {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
  max-height: 44px;
  overflow: hidden;
}

.card-tag {
  padding: 2px 7px;
  background: rgba(253, 250, 216, 0.05);
  color: var(--text-secondary);
  font-family: var(--font-mono);
  font-size: 11px;
  border-radius: 4px;
  letter-spacing: 0.03em;
  border: 0.5px solid var(--border);
}

.card-actions {
  display: flex;
  gap: 6px;
  margin-top: auto;
  flex-wrap: wrap;
}

.card-btn {
  flex: 1;
  min-width: 0;
  padding: 9px 10px;
  background: rgba(253, 250, 216, 0.06);
  color: var(--text-primary);
  border: 0.5px solid var(--border);
  border-radius: 7px;
  font-family: var(--font-heading);
  font-size: 12.5px;
  font-weight: 500;
  cursor: pointer;
  text-align: center;
  text-decoration: none;
  transition: all 0.15s var(--ease-out);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.card-btn:hover {
  background: rgba(255, 255, 255, 0.09);
  border-color: var(--border-strong);
}

.card-btn.primary {
  background: var(--accent);
  color: #23090a;
  border-color: var(--accent);
}

.card-btn.primary:hover {
  background: var(--accent-hover);
}

/* Skill and contact card variants */
.card.skill-card .card-visual { height: 42%; }
.card.skill-card .card-body { height: 58%; }

/* No-thumbnail card variant: adjust spacing so visual feels intentional */
.card.no-thumb .visual-title {
  margin-top: auto;
  margin-bottom: auto;
  padding: 8px 0;
}

.card.no-thumb .project-name {
  font-size: 27px;
  line-height: 1.2;
  margin-bottom: 6px;
}

.card.no-thumb .project-sub {
  font-size: 10px;
}

.card.no-thumb .visual-title::after {
  content: '';
  display: block;
  width: 32px;
  height: 1px;
  background: rgba(255, 255, 255, 0.25);
  margin-top: 14px;
}

.skill-category-list {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
}

.skill-pill {
  padding: 5px 10px;
  background: rgba(255, 255, 255, 0.05);
  color: var(--text-primary);
  font-family: var(--font-mono);
  font-size: 10.5px;
  border-radius: 5px;
  border: 0.5px solid var(--border);
}

.skill-pill.featured {
  background: var(--accent-soft);
  color: var(--accent);
  border-color: rgba(184, 168, 122, 0.3);
}

/* DECK CONTROLS */
.deck-controls {
  display: flex;
  align-items: center;
  gap: 20px;
  margin-top: 40px;
  max-width: 520px;
}

.control-btn {
  width: 44px;
  height: 44px;
  background: rgba(255, 255, 255, 0.04);
  border: 0.5px solid var(--border);
  border-radius: 50%;
  color: var(--text-primary);
  cursor: pointer;
  transition: all 0.15s var(--ease-out);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 17px;
  font-family: var(--font-mono);
}

.control-btn:hover {
  background: rgba(255, 255, 255, 0.08);
  border-color: var(--border-strong);
}

.dots {
  flex: 1;
  display: flex;
  gap: 5px;
  align-items: center;
  justify-content: center;
}

.dot {
  width: 6px;
  height: 6px;
  background: var(--border-strong);
  border-radius: 50%;
  cursor: pointer;
  transition: all 0.2s var(--ease-out);
}

.dot.active {
  width: 24px;
  border-radius: 3px;
  background: var(--accent);
}

.autoplay-toggle {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 14px;
  background: transparent;
  border: 0.5px solid var(--border);
  border-radius: 20px;
  color: var(--text-secondary);

const sectionsRoot = document.getElementById('sections');

function renderCard(card, isSkills = false, isRole = false) {
  const [c1, c2, c3] = card.colors;
  const showThumb = card.hasThumb !== false;

  if (isRole) {
    const photo = card.image
      ? `<img class="visual-photo" src="${card.image}" alt="${card.projectName || 'Role model'}" loading="lazy">`
      : '<div class="photo-empty">PORTRAIT</div>';
    return `
    <div class="card role-card no-thumb" data-position="hidden">
      <div class="card-visual role-visual">
        <div class="blob blob-1" style="background: ${c1};"></div>
        <div class="blob blob-2" style="background: ${c2};"></div>
        <div class="blob blob-3" style="background: ${c3};"></div>
        ${photo}
        <div class="visual-grain"></div>
        <div class="visual-overlay"></div>
        <div class="visual-top">
          <div class="visual-badge">${card.category}</div>
          <div class="visual-icon">${card.icon}</div>
        </div>
        <div class="visual-title">
          <div class="project-name">${card.projectName}</div>
          <div class="project-sub">${card.projectSub}</div>
        </div>
      </div>
      <div class="card-body role-body">
        ${(card.words && card.words.length)
          ? `<div class="role-words">${card.words.map(w => `<span class="role-word">&ldquo;${w}&rdquo;</span>`).join('')}</div>`
          : `<p class="card-description role-note">${card.description || ''}</p>`}
      </div>
    </div>
    `;
  }

  const thumbHTML = showThumb ? `
    <div class="visual-thumb video-btn" role="button" tabindex="0" aria-label="Play ${card.projectName || 'project'} video" data-videos="${encodeURIComponent(JSON.stringify(card.videos || []))}" data-project="${encodeURIComponent(card.projectName || 'Project')}">
      <div class="thumb-play">▶</div>
      <div class="thumb-label">
        <span>${card.thumbLabel}</span>
        <span>${card.thumbDuration}</span>
      </div>
    </div>
  ` : '';

  let bodyContent = '';
  if (isSkills) {
    bodyContent = `
      <div class="card-date">${card.date}</div>
      <p class="card-description">${card.description}</p>
      <div class="skill-category-list">
        ${card.skills.map(s => `<span class="skill-pill ${card.featured.includes(s) ? 'featured' : ''}">${s}</span>`).join('')}
      </div>
    `;
  } else {
    bodyContent = `
      <div class="card-date">${card.date}</div>
      <p class="card-description">${card.description}</p>
      <div class="card-tags">
        ${card.tags.map(t => `<span class="card-tag">${t}</span>`).join('')}
      </div>
      ${card.links ? `<div class="card-actions">
        ${card.links.map(l => l.video
          ? `<button type="button" class="card-btn ${l.primary ? 'primary' : ''} video-btn" data-videos="${encodeURIComponent(JSON.stringify(card.videos || []))}" data-project="${encodeURIComponent(card.projectName || 'Project')}">${l.label}</button>`
          : `<a class="card-btn ${l.primary ? 'primary' : ''}" href="${l.href}" target="_blank" rel="noopener">${l.label}</a>`).join('')}
      </div>` : ''}
    `;
  }

  return `
    <div class="card ${isSkills ? 'skill-card' : ''} ${!showThumb ? 'no-thumb' : ''}" data-position="hidden">
      <div class="card-visual">
        <div class="blob blob-1" style="background: ${c1};"></div>
        <div class="blob blob-2" style="background: ${c2};"></div>
        <div class="blob blob-3" style="background: ${c3};"></div>
        <div class="visual-grain"></div>
        <div class="visual-overlay"></div>

        <div class="visual-top">
          <div class="visual-badge">${card.category}</div>
          <div class="visual-icon">${card.icon}</div>
        </div>

        <div class="visual-title">
          <div class="project-name">${card.projectName}</div>
          <div class="project-sub">${card.projectSub}</div>
        </div>

        ${thumbHTML}

        <div class="visual-metric">
          <div class="metric-value">${card.metric}</div>
          <div class="metric-label">${card.metricLabel}</div>
        </div>
      </div>
      <div class="card-body">
        ${bodyContent}
      </div>
    </div>
  `;
}

function renderSection(key, sectionData) {
  const isSkills = key === 'skills';
  const isRole = key === 'roleModels';
  const cover = isRole ? '' : `
        <div class="cover">
          <div>
            <div class="cover-num">${sectionData.coverNum}</div>
            <h1 class="cover-title">${sectionData.coverTitle}</h1>
            <p class="cover-description">${sectionData.coverDesc}</p>
          </div>
          <div>
            <div class="cover-counter">
              <span class="counter-current">01</span>
              <span class="counter-total">/ ${String(sectionData.cards.length).padStart(2, '0')}</span>
            </div>
            <div class="cover-progress">
              <div class="cover-progress-fill" style="width: ${100/sectionData.cards.length}%;"></div>
            </div>
          </div>
        </div>`;
  return `
    <section class="section-view" data-section="${key}">
      <div class="stack-layout${isRole ? ' role-solo' : ''}">
        ${cover}
        <div class="deck-container">
          <div class="deck">
            ${sectionData.cards.map(c => renderCard(c, isSkills, isRole)).join('')}
          </div>
          <div class="deck-controls">
            <button class="control-btn prev-btn" aria-label="Previous">←</button>
            <div class="dots">
              ${sectionData.cards.map((_, i) => `<span class="dot ${i === 0 ? 'active' : ''}" data-index="${i}"></span>`).join('')}
            </div>
            <button class="autoplay-toggle playing" aria-label="Toggle autoplay">
              <span class="autoplay-dot"></span>
              <span class="autoplay-label">AUTO</span>
            </button>
            <button class="control-btn next-btn" aria-label="Next">→</button>
          </div>
        </div>
      </div>
    </section>
  `;
}

sectionsRoot.innerHTML = Object.entries(data).map(([key, val]) => renderSection(key, val)).join('');

const state = {
  currentSection: 'about',
  cardIndices: {},
  autoplay: {},
  timers: {}
};
Object.keys(data).forEach(k => { state.cardIndices[k] = 0; state.autoplay[k] = true; });

function updateDeck(sectionKey) {
  const view = document.querySelector(`.section-view[data-section="${sectionKey}"]`);
  if (!view) return;
  const cards = view.querySelectorAll('.card');
  const currentIdx = state.cardIndices[sectionKey];
  const total = cards.length;

  cards.forEach((card, i) => {
    let pos = (i - currentIdx + total) % total;
    card.dataset.position = pos === 0 ? '0' : pos <= 3 ? String(pos) : 'hidden';
  });

  const counter = view.querySelector('.counter-current');
  if (counter) counter.textContent = String(currentIdx + 1).padStart(2, '0');

  view.querySelectorAll('.dot').forEach((dot, i) => {
    dot.classList.toggle('active', i === currentIdx);
  });

  const progressFill = view.querySelector('.cover-progress-fill');
  if (progressFill) progressFill.style.width = `${((currentIdx + 1) / total) * 100}%`;
}

function next(sectionKey) {
  const total = data[sectionKey].cards.length;
  state.cardIndices[sectionKey] = (state.cardIndices[sectionKey] + 1) % total;
  updateDeck(sectionKey);
}

function prev(sectionKey) {
  const total = data[sectionKey].cards.length;
  state.cardIndices[sectionKey] = (state.cardIndices[sectionKey] - 1 + total) % total;
  updateDeck(sectionKey);
}

function goTo(sectionKey, index) {
  state.cardIndices[sectionKey] = index;
  updateDeck(sectionKey);
}

function startAutoplay(sectionKey) {
  clearInterval(state.timers[sectionKey]);
  if (!state.autoplay[sectionKey]) return;
  state.timers[sectionKey] = setInterval(() => next(sectionKey), 4500);
}

function stopAutoplay(sectionKey) {
  clearInterval(state.timers[sectionKey]);
}

function toggleAutoplay(sectionKey) {
  state.autoplay[sectionKey] = !state.autoplay[sectionKey];
  const view = document.querySelector(`.section-view[data-section="${sectionKey}"]`);
  const toggle = view.querySelector('.autoplay-toggle');
  toggle.classList.toggle('playing', state.autoplay[sectionKey]);
  toggle.querySelector('.autoplay-label').textContent = state.autoplay[sectionKey] ? 'AUTO' : 'PAUSED';
  if (state.autoplay[sectionKey]) startAutoplay(sectionKey);
  else stopAutoplay(sectionKey);
}

function switchSection(sectionKey) {
  Object.keys(state.timers).forEach(k => clearInterval(state.timers[k]));
  document.querySelectorAll('.nav-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.section === sectionKey);
  });
  document.querySelectorAll('.section-view').forEach(view => {
    view.classList.toggle('active', view.dataset.section === sectionKey);
  });
  state.currentSection = sectionKey;
  updateDeck(sectionKey);
  if (state.autoplay[sectionKey]) startAutoplay(sectionKey);
}

document.querySelectorAll('.nav-btn').forEach(btn => {
  btn.addEventListener('click', () => switchSection(btn.dataset.section));
});

document.querySelectorAll('.section-view').forEach(view => {
  const sectionKey = view.dataset.section;

  view.querySelector('.next-btn').addEventListener('click', () => {
    next(sectionKey);
    if (state.autoplay[sectionKey]) startAutoplay(sectionKey);
  });

  view.querySelector('.prev-btn').addEventListener('click', () => {
    prev(sectionKey);
    if (state.autoplay[sectionKey]) startAutoplay(sectionKey);
  });

  view.querySelector('.autoplay-toggle').addEventListener('click', () => toggleAutoplay(sectionKey));

  view.querySelectorAll('.dot').forEach(dot => {
    dot.addEventListener('click', () => {
      goTo(sectionKey, parseInt(dot.dataset.index));
      if (state.autoplay[sectionKey]) startAutoplay(sectionKey);
    });
  });

  view.querySelectorAll('.card').forEach(card => {
    card.addEventListener('click', (e) => {
      if (e.target.closest('.card-btn') || e.target.closest('.visual-thumb')) return;
      if (card.dataset.position !== '0') {
        next(sectionKey);
        if (state.autoplay[sectionKey]) startAutoplay(sectionKey);
      }
    });
  });

  const deck = view.querySelector('.deck');
  deck.addEventListener('mouseenter', () => stopAutoplay(sectionKey));
  deck.addEventListener('mouseleave', () => {
    if (state.autoplay[sectionKey]) startAutoplay(sectionKey);
  });
});

document.addEventListener('keydown', (e) => {
  const vmEl = document.getElementById('videoModal');
  if (vmEl && vmEl.classList.contains('open')) return;
  const key = e.key;
  const section = state.currentSection;
  if (key === 'ArrowRight') { next(section); if (state.autoplay[section]) startAutoplay(section); }
  else if (key === 'ArrowLeft') { prev(section); if (state.autoplay[section]) startAutoplay(section); }
  else if (key === ' ') { e.preventDefault(); toggleAutoplay(section); }
  else if (['1', '2', '3', '4', '5', '6', '7'].includes(key)) {
    const sections = Object.keys(data);
    if (sections[parseInt(key) - 1]) switchSection(sections[parseInt(key) - 1]);
  }
});

// Deep-link from the warehouse bays: ?p=slug opens that project card directly
const DEEP_LINK = { 'fault-tolerant': 0, 'multi-robot': 1, 'crop-weed': 2, 'drone-landing': 3, 'maze': 4 };
(function () {
  const p = new URLSearchParams(location.search).get('p');
  if (p && DEEP_LINK[p] !== undefined) {
    state.autoplay['projects'] = false;
    switchSection('projects');
    goTo('projects', DEEP_LINK[p]);
  } else {
    document.querySelector('.section-view[data-section="about"]').classList.add('active');
    updateDeck('about');
    startAutoplay('about');
  }
})();

document.querySelectorAll('.deck').forEach(deck => {
  let startX = null;
  const sectionKey = deck.closest('.section-view').dataset.section;
  deck.addEventListener('touchstart', (e) => { startX = e.touches[0].clientX; stopAutoplay(sectionKey); });
  deck.addEventListener('touchend', (e) => {
    if (startX === null) return;
    const endX = e.changedTouches[0].clientX;
    const diff = startX - endX;
    if (Math.abs(diff) > 40) { if (diff > 0) next(sectionKey); else prev(sectionKey); }
    startX = null;
    if (state.autoplay[sectionKey]) startAutoplay(sectionKey);
  });
});

/* ===== project video modal ===== */
(function(){
  var modal = document.getElementById('videoModal');
  if(!modal) return;
  var stage = document.getElementById('vmStage');
  var list = document.getElementById('vmList');
  var titleEl = document.getElementById('vmTitle');
  var current = [];

  function toEmbed(u){
    try {
      if(u.indexOf('youtu') !== -1){
        var id = '';
        if(u.indexOf('youtu.be/') !== -1) id = u.split('youtu.be/')[1];
        else if(u.indexOf('v=') !== -1) id = u.split('v=')[1];
        else if(u.indexOf('embed/') !== -1) id = u.split('embed/')[1];
        else if(u.indexOf('shorts/') !== -1) id = u.split('shorts/')[1];
        if(id){ id = id.split('?')[0].split('&')[0].split('#')[0].split('/')[0]; return 'https://www.youtube.com/embed/' + id; }
      }
      if(u.indexOf('vimeo.com/') !== -1){
        var vid = u.split('vimeo.com/')[1];
        if(vid){ vid = vid.split('?')[0].split('&')[0].split('#')[0].split('/')[0]; return 'https://player.vimeo.com/video/' + vid; }
      }
    } catch(_){}
    return u;
  }
  function isFile(u){ u = String(u).toLowerCase().split('?')[0].split('#')[0]; return u.endsWith('.mp4') || u.endsWith('.webm') || u.endsWith('.ogg') || u.endsWith('.mov'); }
  function emptyHtml(){
    return '<div class="vm-empty"><div class="vm-ico">▶</div><div class="vm-note">No video connected yet. Videos for this project will be added from saitejadasari.com.</div></div>';
  }
  function playIdx(idx){
    var v = current[idx];
    Array.prototype.forEach.call(list.children, function(c,i){ c.classList.toggle('active', i===idx); });
    if(!v || !v.url){ stage.innerHTML = emptyHtml(); return; }
    if(isFile(v.url)) stage.innerHTML = '<video controls autoplay playsinline src="' + v.url + '"></video>';
    else stage.innerHTML = '<iframe src="' + toEmbed(v.url) + '" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>';
  }
  function openVM(project, videos){
    current = Array.isArray(videos) ? videos : [];
    titleEl.textContent = project || 'Project';
    var eyebrow = modal.querySelector('.vm-eyebrow');
    if(eyebrow) eyebrow.textContent = current.length > 1 ? (current.length + ' CLIPS · SELECT TO PLAY') : 'PROJECT VIDEO';
    list.innerHTML = '';
    if(current.length){
      current.forEach(function(v,i){
        var chip = document.createElement('button');
        chip.type = 'button'; chip.className = 'vm-chip';
        chip.textContent = '▶ ' + ((v && v.title) ? v.title : ('Clip ' + (i+1)));
        chip.addEventListener('click', function(){ playIdx(i); });
        list.appendChild(chip);
      });
      list.style.display = current.length > 1 ? 'flex' : 'none'; // only show the chooser when there's a choice
      playIdx(0);
    } else {
      list.style.display = 'none';
      stage.innerHTML = emptyHtml();
    }
    modal.classList.add('open'); modal.setAttribute('aria-hidden','false');
    document.body.style.overflow = 'hidden';
  }
  function closeVM(){
    modal.classList.remove('open'); modal.setAttribute('aria-hidden','true');
    stage.innerHTML = '';
    document.body.style.overflow = '';
  }
  modal.addEventListener('click', function(e){ if(e.target.closest('[data-close]')) closeVM(); });
  document.addEventListener('keydown', function(e){ if(e.key === 'Escape' && modal.classList.contains('open')) closeVM(); });
  document.addEventListener('click', function(e){
    var vb = e.target.closest('.video-btn');
    if(!vb) return;
    e.preventDefault();
    var cardEl = vb.closest('.card');
    if(cardEl && cardEl.getAttribute('data-position') !== '0') return;
    var vids = [];
    try { vids = JSON.parse(decodeURIComponent(vb.getAttribute('data-videos') || '')); } catch(_){}
    var proj = 'Project';
    try { proj = decodeURIComponent(vb.getAttribute('data-project') || 'Project'); } catch(_){}
    openVM(proj, vids);
  });
})();
</script>
