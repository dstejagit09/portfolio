<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="theme-color" content="#cfe8ff" />

    <!-- Critical layout: transparent app layer over the full-screen landscape iframe. -->
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: transparent;
      }
      #root {
        position: relative;
        z-index: 1;
        height: 100%;
      }
      /* Animated 3D landscape, fixed behind everything. Decorative by default
         (pointer-events:none) so the robot (keyboard) and the HUD/overlays own all
         input; switch to `auto` if you want the background's drag-to-look/zoom. */
      .site-bg {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        border: 0;
        z-index: 0;
        pointer-events: none;
      }
    </style>

    <title>Saiteja Dasari — Robotics Engineer</title>
    <meta
      name="description"
      content="Interactive 3D portfolio of Saiteja Dasari — MS Robotics @ ASU. Drive a robot around a field to explore projects, experience, education, and skills in robotics, controls, and autonomy."
    />
    <link rel="canonical" href="https://saitejadasari.com/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Saiteja Dasari" />
    <meta property="og:title" content="Saiteja Dasari — Robotics Engineer" />
    <meta
      property="og:description"
      content="An interactive 3D portfolio — drive a robot around a field to explore projects, experience, education, and skills."
    />
    <meta property="og:url" content="https://saitejadasari.com/" />
    <meta property="og:image" content="https://saitejadasari.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Saiteja Dasari — Robotics Engineer" />
    <meta
      name="twitter:description"
      content="An interactive 3D portfolio — drive a robot around a field to explore projects, experience, education, and skills."
    />
    <meta name="twitter:image" content="https://saitejadasari.com/og-image.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
